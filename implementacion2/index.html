<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
</head>
<div>
    

    <div>
        <input id="input-text" type="text">
        <br>
        <button id="button">press</button>
        <br>
    </div>
    <br><br><br>
    <div>
        <button id="button-color">change color</button>
        <br><h1>a simple text</h1>
    </div>

</body>
<script>
    //actividad de la caja de texto
let text = document.getElementById("input-text");
let button = document.getElementById("button");

text.addEventListener("keypress", (event)=>{
    if (event.key === ("Enter" || "enter")){
        (text.value === "") ? alert("la caja de texto está vacia") : alert(text.value)
    }
});

button.addEventListener("click", (event)=>{
    event.preventDefault()
    if(text.value === ""){
        alert("la caja de texto se encuentra vacia")
        return;
    };
    alert(text.value)
});

//actividad de cambio de colores


let colorState = 1;
let buttonColor = document.getElementById("button-color")


buttonColor.addEventListener("click", (event)=>{
    event.preventDefault();

    colorState++
    if(colorState === 4){
        colorState = 1
    }

    if(colorState === 1){
        document.body.style.backgroundColor = "white"
        document.body.style.color = "black"
        return
    }
    if (colorState === 2){
        document.body.style.backgroundColor = "black"
        document.body.style.color = "white"
    }
    if (colorState === 3){
        document.body.style.backgroundColor = "lightblue"
        document.body.style.color = "red";
    }
})


</script>
</html>
